<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascent</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Notion-inspired dark palette */
    --bg:            #191919;
    --surface:       #202020;
    --surface-2:     #272727;
    --surface-3:     #2f2f2f;
    --border:        #373737;
    --border-soft:   #2c2c2c;
    --text:          #e6e6e6;
    --text-2:        #cfcfcf;
    --muted:         #787774;
    --muted-hover:   #9b9a97;
    --accent:        #5b8af0;
    --accent-light:  rgba(91,138,240,0.08);

    /* Notion-exact blue checkbox */
    --notion-blue:       #2383e2;
    --notion-blue-bg:    #2383e2;
    --notion-blue-light: rgba(35,131,226,0.14);

    --green-bg:      rgba(40,84,44,0.35);
    --green-border:  #3d7a3d;
    --green-text:    #6fbe6f;

    --red-bg:        rgba(84,40,40,0.35);
    --red-border:    #7a3d3d;
    --red-text:      #be6f6f;

    --yellow-bg:     rgba(84,76,40,0.35);
    --yellow-text:   #c8a84a;

    --selected-bg:     #2a2a3a;
    --selected-border: #5b8af0;

    --cell-h:   32px;
    --header-h: 36px;

    --font-body:  'Poppins', system-ui, sans-serif;
    --font-mono:  'IBM Plex Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.55;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── AUTH ──────────────────────────────────────────────────────── */
  #auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background: var(--bg);
  }
  #auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 44px 48px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.4);
  }
  #auth-box h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  #auth-box p { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .auth-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .auth-field label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .auth-field input {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .auth-field input:focus { border-color: var(--notion-blue); }
  #auth-submit {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: var(--notion-blue);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #auth-submit:hover { opacity: 0.85; }
  #auth-submit:disabled { opacity: 0.4; cursor: default; }
  #auth-error { font-size: 12px; color: var(--red-text); margin-top: 12px; min-height: 16px; }
  #auth-loading { text-align: center; font-size: 12px; color: var(--muted); padding: 12px 0 0; }

  /* ── FEATURE BLOCKED ── */
  #feature-blocked {
    display: none; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 14px;
    padding: 40px; text-align: center;
  }
  #feature-blocked h2 { font-size: 18px; font-weight: 600; color: var(--muted); }
  #feature-blocked p  { font-size: 13px; color: var(--muted); max-width: 360px; line-height: 1.6; }

  /* ── TOPBAR ──────────────────────────────────────────────────────── */
  #topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  #topbar h1 {
    font-size: 14px; font-weight: 600; color: var(--text-2);
    white-space: nowrap; letter-spacing: 0.01em;
  }
  .slider-wrap { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 180px; }
  .slider-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  #groupSlider {
    flex: 1; -webkit-appearance: none;
    height: 3px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
  }
  #groupSlider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
    background: var(--notion-blue); cursor: pointer;
    border: 2px solid var(--surface); box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  #sliderVal { font-family: var(--font-mono); font-size: 11px; color: var(--text-2); min-width: 50px; }
  .keys-hint { display: flex; gap: 5px; flex-wrap: wrap; }
  .key-badge {
    font-family: var(--font-mono); font-size: 10px;
    background: var(--surface-3); border: 1px solid var(--border);
    color: var(--muted); padding: 1px 6px; border-radius: 4px; white-space: nowrap;
  }
  .key-badge span { color: var(--text-2); }
  #user-info {
    display: flex; align-items: center; gap: 10px;
    margin-left: auto; font-size: 11px; color: var(--muted); font-family: var(--font-mono);
  }
  #signout-btn {
    font-family: var(--font-mono); font-size: 10px; padding: 3px 9px;
    border-radius: 4px; cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--muted); transition: all 0.15s;
  }
  #signout-btn:hover { color: var(--red-text); border-color: var(--red-border); }
  .topbar-btn {
    font-family: var(--font-body); font-size: 11px; font-weight: 500;
    padding: 4px 11px; border-radius: 5px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface-2);
    color: var(--muted); transition: all 0.15s; white-space: nowrap;
  }
  .topbar-btn:hover           { color: var(--text); background: var(--surface-3); }
  #resetAll:hover             { color: var(--red-text); border-color: var(--red-border); }
  #saveProgress:hover         { color: var(--green-text); border-color: var(--green-border); }
  #saveProgress.saved         { color: var(--green-text); border-color: var(--green-border); }
  .progress-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--notion-blue); vertical-align: middle; opacity: 0; transition: opacity 0.3s;
  }
  .progress-dot.dirty { opacity: 1; }
  #stats { font-family: var(--font-mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
  #stats .g { color: var(--green-text); }
  #stats .r { color: var(--red-text); }

  /* ── NAV TABS ── */
  #nav-tabs {
    display: none; gap: 0;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .nav-tab {
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    padding: 8px 16px; cursor: pointer; border: none; background: transparent;
    color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.15s;
  }
  .nav-tab.active { color: var(--text); border-bottom-color: var(--notion-blue); }
  .nav-tab:hover  { color: var(--text-2); background: var(--surface-2); }

  /* ── VOCAB GRID ──────────────────────────────────────────────────── */
  #grid-container { padding: 14px 24px 60px; overflow-x: auto; }
  #grid { display: flex; flex-direction: column; gap: 0; width: 100%; }
  .grid-row { display: flex; gap: 0; margin-bottom: 28px; width: 100%; }
  .grid-row-divider { height: 1px; background: var(--border); margin: 0 0 24px 0; opacity: 0.5; display: none; }
  .group-col { display: flex; flex-direction: column; flex: 1 1 0; min-width: 0; border-right: 1px solid var(--border-soft); }
  .group-col:last-child { border-right: none; }
  .group-header {
    height: var(--header-h); display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border-soft);
    margin-bottom: 2px; cursor: pointer; user-select: none; transition: color 0.15s; gap: 5px;
  }
  .group-header:hover { color: var(--text-2); }
  .shuffle-icon { opacity: 0.35; font-size: 10px; }
  .group-header:hover .shuffle-icon { opacity: 0.8; }
  .word-cell {
    height: var(--cell-h); display: flex; align-items: center; padding: 0 12px;
    font-size: 12px; font-family: var(--font-mono); cursor: pointer;
    border: 1px solid transparent; border-radius: 4px; margin: 0 3px 1px;
    transition: background 0.1s; user-select: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text);
  }
  .word-cell:hover { background: var(--surface-3); }
  .word-cell.selected { background: var(--selected-bg); border-color: var(--selected-border); color: #fff; }
  .word-cell.green { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
  .word-cell.red   { background: var(--red-bg);   border-color: var(--red-border);   color: var(--red-text); }
  .word-cell.green.selected { border-color: #5fc85f; }
  .word-cell.red.selected   { border-color: #c85f5f; }

  /* ── WORD MODAL ─────────────────────────────────────────────────── */
  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(3px);
    z-index: 200; align-items: center; justify-content: center;
  }
  #overlay.show { display: flex; }
  #modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 32px 38px;
    max-width: 520px; width: 92%; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  }
  #modal-word {
    font-size: 26px; font-weight: 600; color: var(--text);
    margin-bottom: 4px; letter-spacing: -0.01em;
  }
  #modal-group {
    font-family: var(--font-mono); font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px;
  }
  #modal-meaning { font-size: 15px; line-height: 1.8; color: var(--text-2); }
  #modal-meaning ol { padding-left: 20px; }
  #modal-meaning li { margin-bottom: 6px; }
  #modal-actions {
    display: flex; gap: 8px; margin-top: 24px; padding-top: 18px;
    border-top: 1px solid var(--border); flex-wrap: wrap;
  }
  .modal-btn {
    font-family: var(--font-body); font-size: 12px; font-weight: 500;
    padding: 6px 14px; border-radius: 5px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface-2);
    color: var(--muted); transition: all 0.15s;
  }
  .modal-btn:hover     { color: var(--text); background: var(--surface-3); }
  .modal-btn.green-btn { border-color: var(--green-border); color: var(--green-text); background: var(--green-bg); }
  .modal-btn.red-btn   { border-color: var(--red-border);   color: var(--red-text);   background: var(--red-bg); }
  .modal-btn.close-btn { margin-left: auto; }

  /* ── SYNC / LOADING ── */
  #sync-status { font-family: var(--font-mono); font-size: 10px; color: var(--muted); padding: 4px 8px; }
  #app-loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-size: 14px; font-weight: 400;
    color: var(--muted); background: var(--bg);
  }

  /* ══════════════════════════════════════════════════════════════════
     DAILY PROGRESS — NOTION STYLE
  ══════════════════════════════════════════════════════════════════ */
  #daily-view {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 40px 80px;
  }

  /* Page title */
  #daily-page-title {
    font-size: 30px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 28px;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #daily-title-input {
    font-family: var(--font-body);
    font-size: 30px;
    font-weight: 700;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    letter-spacing: -0.02em;
    width: 100%;
    padding: 2px 0;
  }
  #daily-title-input::placeholder { color: var(--muted); }

  /* Month nav row */
  #daily-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .month-nav-btn {
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 5px; cursor: pointer;
    border: none; background: transparent; color: var(--muted);
    font-size: 14px; transition: all 0.12s;
  }
  .month-nav-btn:hover { background: var(--surface-3); color: var(--text); }
  #current-month-label {
    font-family: var(--font-body); font-size: 14px; font-weight: 600;
    color: var(--text-2); min-width: 110px;
  }

  /* Notion-style table */
  .dp-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-body);
    font-size: 13px;
  }
  .dp-table th {
    text-align: left;
    padding: 6px 12px;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    user-select: none;
  }
  .dp-table th:first-child { padding-left: 0; }
  .dp-table td {
    padding: 0;
    border-bottom: 1px solid var(--border-soft);
    vertical-align: middle;
    height: 38px;
  }
  .dp-table tr:last-child td { border-bottom: none; }
  .dp-table tr:hover td { background: var(--surface-2); }
  .dp-table tr.today-row td { background: var(--notion-blue-light); }
  .dp-table tr.today-row:hover td { background: rgba(35,131,226,0.18); }
  .dp-table tr.future-row { opacity: 0.35; pointer-events: none; }

  /* Date cell */
  .dp-date {
    padding: 0 8px 0 0;
    display: flex; align-items: center; gap: 8px;
    height: 38px; white-space: nowrap;
  }
  .dp-date-num {
    font-size: 13px; font-weight: 500; color: var(--text-2);
    min-width: 80px;
  }
  .dp-date-day {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--muted); letter-spacing: 0.05em;
    background: var(--surface-3); padding: 1px 5px; border-radius: 3px;
  }
  .dp-date-day.weekend { color: var(--yellow-text); }

  /* Notion-style blue checkbox */
  .dp-check { padding: 0 8px; text-align: center; width: 80px; }
  .notion-checkbox {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 3px;
    border: 1.5px solid var(--muted);
    background: transparent;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    user-select: none; vertical-align: middle;
    position: relative;
    flex-shrink: 0;
  }
  .notion-checkbox:hover { border-color: var(--notion-blue); background: var(--notion-blue-light); }
  .notion-checkbox.checked {
    background: var(--notion-blue-bg);
    border-color: var(--notion-blue-bg);
  }
  /* Checkmark via SVG-like CSS */
  .notion-checkbox.checked::after {
    content: '';
    position: absolute;
    width: 4px; height: 8px;
    border: 2px solid #fff;
    border-top: none; border-left: none;
    transform: rotate(45deg) translate(-0.5px, -1px);
  }

  /* Notes cell — shows preview, click opens modal */
  .dp-notes-cell {
    padding: 0 8px;
    cursor: pointer;
    min-width: 180px;
  }
  .dp-notes-preview {
    font-size: 12.5px; color: var(--text-2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 240px; padding: 2px 0;
    display: flex; align-items: center; gap: 6px;
    height: 38px;
  }
  .dp-notes-preview.empty { color: var(--muted); font-style: normal; }
  .dp-notes-preview.has-notes { color: var(--text-2); }
  .dp-notes-count {
    font-family: var(--font-mono); font-size: 10px;
    background: var(--surface-3); color: var(--muted);
    padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
  }
  .dp-notes-cell:hover .dp-notes-preview { color: var(--text); }

  /* Effort — plain text input */
  .dp-effort { padding: 0 12px; width: 100px; }
  .dp-effort-input {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--text-2); font-family: var(--font-body); font-size: 13px;
    cursor: text; padding: 0;
  }
  .dp-effort-input::placeholder { color: var(--muted); }
  .dp-effort-input:focus { color: var(--text); }

  /* Completed pill */
  .dp-completed { padding: 0 12px; width: 100px; }
  .dp-status-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 500; white-space: nowrap;
  }
  .dp-status-pill.done    { background: var(--green-bg); color: var(--green-text); }
  .dp-status-pill.partial { background: var(--yellow-bg); color: var(--yellow-text); }
  .dp-status-pill.none    { color: var(--muted); }

  /* ── NOTES MODAL ──────────────────────────────────────────────── */
  #notes-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(3px);
    z-index: 300; align-items: center; justify-content: center;
  }
  #notes-overlay.show { display: flex; }
  #notes-modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; width: 560px; max-width: 94vw;
    max-height: 80vh; display: flex; flex-direction: column;
    box-shadow: 0 16px 64px rgba(0,0,0,0.55);
    overflow: hidden;
  }
  #notes-modal-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  #notes-modal-title {
    font-size: 14px; font-weight: 600; color: var(--text);
  }
  #notes-modal-date {
    font-family: var(--font-mono); font-size: 10px; color: var(--muted);
    margin-top: 2px; letter-spacing: 0.06em;
  }
  #notes-modal-close {
    width: 28px; height: 28px; border-radius: 5px; border: none;
    background: transparent; color: var(--muted); cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
  }
  #notes-modal-close:hover { background: var(--surface-3); color: var(--text); }

  /* The bullet-list editor */
  #notes-editor {
    flex: 1; overflow-y: auto;
    padding: 14px 22px 10px;
    min-height: 220px; max-height: 60vh;
  }
  .note-line {
    display: flex; align-items: flex-start; gap: 8px;
    margin-bottom: 2px; min-height: 30px;
  }
  .note-bullet {
    font-family: var(--font-mono); font-size: 13px;
    color: var(--muted); user-select: none;
    padding-top: 3px; flex-shrink: 0; width: 24px;
    text-align: right;
  }
  .note-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--font-body); font-size: 13.5px;
    line-height: 1.6; padding: 2px 0; resize: none;
    min-height: 26px; overflow: hidden;
  }
  .note-input::placeholder { color: var(--muted); }
  #notes-modal-footer {
    padding: 12px 22px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  .notes-footer-hint {
    font-family: var(--font-mono); font-size: 10px; color: var(--muted);
    display: flex; gap: 10px;
  }
  .notes-footer-hint span { display: flex; align-items: center; gap: 4px; }
  #notes-modal-save {
    padding: 6px 16px; border-radius: 5px; border: none;
    background: var(--notion-blue); color: #fff;
    font-family: var(--font-body); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  #notes-modal-save:hover { opacity: 0.85; }
</style>
</head>
<body>

<div id="app-loading">loading…</div>

<div id="auth-screen" style="display:none">
  <div id="auth-box">
    <h1>⛰ Ascent</h1>
    <p>Sign in to sync your progress across devices.</p>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="auth-submit">Sign In</button>
    <div id="auth-error"></div>
    <div id="auth-loading" style="display:none">signing in…</div>
  </div>
</div>

<div id="feature-blocked" style="display:none">
  <h2>Ascent</h2>
  <p>This feature isn't available for your account right now.</p>
  <button id="signout-btn-blocked" style="margin-top:8px;font-family:var(--font-mono);font-size:11px;padding:7px 16px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);">Sign Out</button>
</div>

<div id="main-app" style="display:none">
  <div id="topbar">
    <h1>⛰ Ascent</h1>
    <div class="slider-wrap">
      <span class="slider-label">Groups:</span>
      <input type="range" id="groupSlider" min="1" max="32" value="6">
      <span id="sliderVal">1–6</span>
    </div>
    <button id="shuffleAll" class="topbar-btn">⇄ Shuffle All</button>
    <button id="resetAll" class="topbar-btn">↺ Reset</button>
    <button id="saveProgress" class="topbar-btn">💾 Save</button>
    <span id="sync-status"></span>
    <div id="stats">— / —</div>
    <span class="progress-dot" id="dirtyDot" title="Unsaved changes"></span>
    <div class="keys-hint">
      <span class="key-badge">↑↓ <span>nav</span></span>
      <span class="key-badge">D <span>details</span></span>
      <span class="key-badge">G <span>green</span></span>
      <span class="key-badge">R <span>red</span></span>
    </div>
    <div id="user-info">
      <span id="user-email-display"></span>
      <button id="signout-btn">sign out</button>
    </div>
  </div>

  <div id="nav-tabs">
    <button class="nav-tab active" data-tab="vocab">Vocab Mountain</button>
    <button class="nav-tab" data-tab="daily">Daily Progress</button>
  </div>

  <div id="vocab-view">
    <div id="grid-container"><div id="grid"></div></div>
  </div>

  <div id="daily-view" style="display:none">
    <div id="daily-page-title">
      <input id="daily-title-input" type="text" value="Daily Progress Tracker"
             spellcheck="false" placeholder="Untitled">
    </div>
    <div id="daily-controls">
      <button class="month-nav-btn" id="prevMonth">‹</button>
      <span id="current-month-label"></span>
      <button class="month-nav-btn" id="nextMonth">›</button>
    </div>
    <table class="dp-table">
      <thead>
        <tr>
          <th style="min-width:140px">Date</th>
          <th style="width:80px; text-align:center">GRE</th>
          <th style="width:80px; text-align:center">Skills</th>
          <th style="min-width:200px">GRE Notes</th>
          <th style="min-width:200px">Skills Notes</th>
          <th style="width:110px">Effort</th>
          <th style="width:90px">Status</th>
        </tr>
      </thead>
      <tbody id="dp-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Vocab word modal -->
<div id="overlay">
  <div id="modal">
    <div id="modal-word"></div>
    <div id="modal-group"></div>
    <div id="modal-meaning"></div>
    <div id="modal-actions">
      <button class="modal-btn green-btn" id="mGreen">G — Mark Green</button>
      <button class="modal-btn red-btn"   id="mRed">R — Mark Red</button>
      <button class="modal-btn close-btn" id="mClose">ESC — Close</button>
    </div>
  </div>
</div>

<!-- Notes editor modal -->
<div id="notes-overlay">
  <div id="notes-modal">
    <div id="notes-modal-header">
      <div>
        <div id="notes-modal-title">Notes</div>
        <div id="notes-modal-date"></div>
      </div>
      <button id="notes-modal-close">✕</button>
    </div>
    <div id="notes-editor"></div>
    <div id="notes-modal-footer">
      <div class="notes-footer-hint">
        <span>↵ new line</span>
        <span>⌘↵ save &amp; close</span>
      </div>
      <button id="notes-modal-save">Save</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
